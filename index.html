<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple HTML with Internal CSS</title>
    <style>
        /* Internal CSS starts here */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff; /* light blue background */
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #3333cc; /* dark blue heading */
            text-align: center;
        }

        p {
            color: #555555;
            font-size: 18px;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3333cc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .button:hover {
            background-color: #5555ff;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Simple Page</h1>
    <p>This is a paragraph styled using <strong>internal CSS</strong>. You can change colors, fonts, and layouts right here in the HTML file.</p>
    <a href="#" class="button">Click Me</a>
</body>
</html>
